<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovereign Works Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@100;200;300;400;600&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #050505; color: #f5f0e8; font-family: system-ui, sans-serif; }
    #root { min-height: 100vh; }
    #boot-status {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #050505; z-index: 10000; font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase;
      color: #c9a84c;
    }
    #boot-error {
      display: none; position: fixed; inset: 0; overflow: auto; z-index: 10001;
      background: #1a0808; color: #ffb4b4; padding: 24px; box-sizing: border-box;
    }
    #boot-error pre { white-space: pre-wrap; font: 12px/1.5 ui-monospace, monospace; }
    #boot-error h1 { font-size: 16px; color: #ff8888; margin: 0 0 12px; }
  </style>
</head>
<body>
  <div id="boot-status">Loading Sovereign Works prototype…</div>
  <div id="boot-error" role="alert">
    <h1>Prototype failed to load</h1>
    <pre id="boot-error-text"></pre>
    <p style="color:#a08080;font-size:12px;margin-top:16px">
      Run from this folder: <code>npx serve . -l 8765</code> then open
      <a href="http://localhost:8765" style="color:#c9a84c">http://localhost:8765</a>
      (do not open index.html as a file:// URL).
    </p>
  </div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js" crossorigin></script>
  <script>
    (async function boot() {
      const statusEl = document.getElementById('boot-status');
      const errorBox = document.getElementById('boot-error');
      const errorText = document.getElementById('boot-error-text');

      function fail(message, err) {
        console.error(message, err || '');
        statusEl.style.display = 'none';
        errorBox.style.display = 'block';
        errorText.textContent = message + (err && err.stack ? '\n\n' + err.stack : err ? '\n\n' + err : '');
      }

      try {
        if (!window.React || !window.ReactDOM) {
          throw new Error('React CDN failed to load. Check your internet connection or firewall.');
        }
        if (!window.Babel) {
          throw new Error('Babel CDN failed to load. Check your internet connection or firewall.');
        }

        statusEl.textContent = 'Fetching sovereign_v9.jsx…';
        const res = await fetch('./sovereign_v9.jsx?v=' + Date.now());
        if (!res.ok) {
          throw new Error('Could not fetch sovereign_v9.jsx (HTTP ' + res.status + '). Is the dev server running?');
        }
        const source = await res.text();

        statusEl.textContent = 'Compiling prototype…';
        const compiled = Babel.transform(source, {
          presets: ['react'],
          filename: 'sovereign_v9.jsx',
        }).code;

        statusEl.textContent = 'Starting app…';
        (0, eval)(compiled);

        await new Promise((resolve) => {
          let tries = 0;
          const tick = () => {
            if (document.getElementById('root').childElementCount > 0 || tries++ > 40) {
              resolve();
              return;
            }
            requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        });

        if (!document.getElementById('root').childElementCount) {
          throw new Error('App compiled but did not render into #root.');
        }

        errorBox.style.display = 'none';
        statusEl.style.display = 'none';
      } catch (err) {
        fail(err.message || String(err), err);
      }
    })();
  </script>
</body>
</html>
